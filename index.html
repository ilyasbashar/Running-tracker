                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('setMin').disabled=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('setSec').disabled=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const dk=totalDistM/1000;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('fDist').textContent=dk.toFixed(2)+' km ('+Math.round(totalDistM)+' m)';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              document.getElementById('fTime').textContent=fmt(elapsedSec);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('fPace').textContent=(elapsedSec>0&&dk>0.01)?fmt(Math.round(elapsedSec/dk))+'/km':'--:--';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById('fCal').textContent=Math.round(dk*65)+' kcal';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(navigator.vibrate)navigator.vibrate([300,100,300]);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      setTimeout(()=>document.getElementById('finishOverlay').classList.add('show'),600);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function closeFinish(){document.getElementById('finishOverlay').classList.remove('show')}

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function resetAll(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        clearInterval(timerInterval);clearInterval(elapsedInterval);stopGPS();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          isRunning=false;isPaused=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            remainSec=0;elapsedSec=0;totalDistM=0;lastPos=null;currentSpeed=0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const m=parseInt(document.getElementById('setMin').value)||7;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const s=parseInt(document.getElementById('setSec').value)||0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById('timerDisp').textContent=fmt(m*60+s);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('timerDisp').className='timer-big';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('progressFill').style.width='100%';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('elapsedVal').textContent='00:00';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.getElementById('speedVal').textContent='0.0';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('paceVal').textContent='--:--';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              document.getElementById('calVal').textContent='0';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('startBtn').disabled=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById('pauseBtn').disabled=true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('setMin').disabled=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('setSec').disabled=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        updateDistDisplay();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          setStatus('idle');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setGPS('idle','GPS بند ہے — Start دبائیں');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function setStatus(s){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const bar=document.getElementById('statusBar');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const dots=document.getElementById('runDots');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const map={running:['s-running','● RUNNING'],paused:['s-paused','⏸ PAUSED'],done:['s-done','🏁 FINISHED!'],idle:['s-idle','● READY']};
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    bar.className='status-bar '+map[s][0];bar.textContent=map[s][1];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      dots.className='run-dots'+(s==='running'?' show':'');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('setMin').addEventListener('input',()=>{if(!isRunning&&!isPaused){const m=parseInt(document.getElementById('setMin').value)||0,s=parseInt(document.getElementById('setSec').value)||0;document.getElementById('timerDisp').textContent=fmt(m*60+s)}});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('setSec').addEventListener('input',()=>{if(!isRunning&&!isPaused){const m=parseInt(document.getElementById('setMin').value)||0,s=parseInt(document.getElementById('setSec').value)||0;document.getElementById('timerDisp').textContent=fmt(m*60+s)}});

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW:',e))}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </html>
