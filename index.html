<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunTrack</title>
<meta name="theme-color" content="#00ff87">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RunTrack">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Nastaliq+Urdu:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--card:#12151c;--green:#00ff87;--green2:#00c96b;--orange:#ff6b35;--blue:#4facfe;--text:#e8eaf0;--muted:#5a6080;--glow:0 0 20px rgba(0,255,135,0.4);--border:rgba(0,255,135,0.15)}
body{background:var(--bg);font-family:'Orbitron',monospace;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,135,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,135,0.03) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 20s linear infinite;pointer-events:none;z-index:0}
@keyframes gridMove{0%{transform:translateY(0)}100%{transform:translateY(40px)}}
.container{position:relative;z-index:1;width:100%;max-width:420px}
.header{text-align:center;margin-bottom:24px}
.header .icon{font-size:40px;margin-bottom:6px;filter:drop-shadow(0 0 12px rgba(0,255,135,0.6));animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.header h1{font-size:22px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-family:'Noto Nastaliq Urdu',serif;font-size:13px;color:var(--muted);direction:rtl;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease backwards}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:0.5}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card-label{font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-label::after{content:'';flex:1;height:1px;background:var(--border)}
.gps-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:11px;letter-spacing:1px;transition:all 0.4s}
.gps-idle{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:var(--muted)}
.gps-searching{background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.3);color:var(--orange)}
.gps-active{background:rgba(0,255,135,0.08);border:1px solid rgba(0,255,135,0.3);color:var(--green)}
.gps-error{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.3);color:#ff6666}
.gps-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
.gps-active .gps-dot{animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.distance-big{text-align:center;margin-bottom:10px}
.dist-num{font-size:72px;font-weight:900;color:var(--blue);text-shadow:0 0 20px rgba(79,172,254,0.4);letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums}
.dist-unit-row{display:flex;justify-content:center;gap:16px;margin-top:6px}
.dist-unit-btn{padding:5px 14px;border-radius:20px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);background:transparent;color:var(--muted)}
.dist-unit-btn.active{background:rgba(79,172,254,0.15);border-color:var(--blue);color:var(--blue)}
.timer-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.timer-big{font-size:48px;font-weight:900;color:var(--green);text-shadow:var(--glow);font-variant-numeric:tabular-nums;transition:color 0.5s}
.timer-big.warning{color:var(--orange);animation:tpulse 1s ease-in-out infinite}
.timer-big.done{color:#ff4444}
@keyframes tpulse{0%,100%{opacity:1}50%{opacity:0.6}}
.timer-set{flex:1}
.timer-set label{font-size:9px;letter-spacing:2px;color:var(--muted);display:block;margin-bottom:6px}
.timer-inputs{display:flex;align-items:center;gap:6px}
.timer-inputs input{width:56px;height:44px;background:rgba(0,255,135,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Orbitron',monospace;font-size:18px;font-weight:700;text-align:center;outline:none;transition:all 0.3s;-moz-appearance:textfield}
.timer-inputs input::-webkit-outer-spin-button,.timer-inputs input::-webkit-inner-spin-button{-webkit-appearance:none}
.timer-inputs input:focus{border-color:var(--green);box-shadow:var(--glow)}
.timer-colon{font-size:22px;font-weight:900;color:var(--green);opacity:0.6}
.progress-wrap{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--blue));transition:width 1s linear;filter:drop-shadow(0 0 4px rgba(0,255,135,0.5))}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:18px;font-weight:700;color:var(--green)}
.stat-val.blue{color:var(--blue)}
.stat-val.orange{color:var(--orange)}
.stat-lbl{font-family:'Noto Nastaliq Urdu',serif;font-size:11px;color:var(--muted);direction:rtl;margin-top:3px}
.status-bar{text-align:center;padding:9px;border-radius:10px;font-size:11px;letter-spacing:2px;margin-bottom:12px;transition:all 0.4s}
.s-idle{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:var(--muted)}
.s-running{background:rgba(0,255,135,0.08);border:1px solid rgba(0,255,135,0.2);color:var(--green)}
.s-paused{background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);color:var(--orange)}
.s-done{background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);color:#ff6666;animation:flashB 1s ease-in-out infinite}
@keyframes flashB{0%,100%{border-color:rgba(255,68,68,0.3)}50%{border-color:rgba(255,68,68,0.8)}}
.btn-row{display:flex;gap:10px}
.btn{flex:1;border:none;border-radius:14px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px;padding:13px 8px;cursor:pointer;transition:all 0.25s;text-transform:uppercase}
.btn-start{background:linear-gradient(135deg,var(--green),var(--green2));color:#0a0c10;box-shadow:0 4px 20px rgba(0,255,135,0.3)}
.btn-start:hover{transform:translateY(-2px)}
.btn-pause{background:rgba(255,107,53,0.15);border:1px solid rgba(255,107,53,0.4);color:var(--orange)}
.btn-reset{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--muted)}
.run-dots{display:none;justify-content:center;gap:4px;margin-top:8px}
.run-dots.show{display:flex}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:bounce 0.6s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.1s}.dot:nth-child(3){animation-delay:0.2s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-6px);opacity:1}}
.finish-overlay{display:none;position:fixed;inset:0;background:rgba(10,12,16,0.93);z-index:100;align-items:center;justify-content:center}
.finish-overlay.show{display:flex}
.finish-card{background:var(--card);border:1px solid var(--green);border-radius:24px;padding:36px 28px;text-align:center;max-width:320px;width:90%;box-shadow:0 0 60px rgba(0,255,135,0.2);animation:scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes scaleIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.finish-emoji{font-size:56px;margin-bottom:10px}
.finish-title{font-size:18px;font-weight:900;letter-spacing:3px;color:var(--green);margin-bottom:18px;text-shadow:var(--glow)}
.finish-stat{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.finish-stat:last-child{border:none}
.finish-stat .lbl{font-family:'Noto Nastaliq Urdu',serif;color:var(--muted);direction:rtl}
.finish-stat .val{color:var(--green);font-weight:700}
.btn-done{background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:12px;color:#0a0c10;font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:2px;padding:13px 28px;cursor:pointer;margin-top:18px;transition:all 0.2s}
</style>
</head>
<body>
<div class="container">
  <div class="header">
      <div class="icon">🏃</div>
          <h1>RUNTRACK</h1>
              <p>GPS سے اپنی دوڑ ٹریک کریں</p>
                </div>

                  <div class="card">
                      <div class="card-label">📍 GPS Distance</div>
                          <div class="gps-bar gps-idle" id="gpsBar">
                                <div class="gps-dot"></div>
                                      <span id="gpsText">GPS بند ہے — Start دبائیں</span>
                                          </div>
                                              <div class="distance-big">
                                                    <div class="dist-num" id="distNum">0.00</div>
                                                          <div class="dist-unit-row">
                                                                  <button class="dist-unit-btn active" id="btnKm" onclick="setUnit('km')">KM</button>
                                                                          <button class="dist-unit-btn" id="btnM" onclick="setUnit('m')">METER</button>
                                                                                </div>
                                                                                    </div>
                                                                                      </div>

                                                                                        <div class="card">
                                                                                            <div class="card-label">⏱ Countdown Timer</div>
                                                                                                <div class="timer-row">
                                                                                                      <div class="timer-big" id="timerDisp">07:00</div>
                                                                                                            <div class="timer-set">
                                                                                                                    <label>وقت سیٹ کریں</label>
                                                                                                                            <div class="timer-inputs">
                                                                                                                                      <input type="number" id="setMin" value="7" min="0" max="99">
                                                                                                                                                <span class="timer-colon">:</span>
                                                                                                                                                          <input type="number" id="setSec" value="0" min="0" max="59">
                                                                                                                                                                  </div>
                                                                                                                                                                        </div>
                                                                                                                                                                            </div>
                                                                                                                                                                                <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:100%"></div></div>
                                                                                                                                                                                    <div class="status-bar s-idle" id="statusBar">● READY</div>
                                                                                                                                                                                        <div class="run-dots" id="runDots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                                                                                                                                                                                            <div class="btn-row" style="margin-top:12px">
                                                                                                                                                                                                  <button class="btn btn-start" id="startBtn" onclick="startRun()">▶ START</button>
                                                                                                                                                                                                        <button class="btn btn-pause" id="pauseBtn" onclick="pauseRun()" disabled>⏸ PAUSE</button>
                                                                                                                                                                                                              <button class="btn btn-reset" onclick="resetAll()">↺ RESET</button>
                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                      <div class="card">
                                                                                                                                                                                                                          <div class="card-label">📊 Live Stats</div>
                                                                                                                                                                                                                              <div class="stats-grid">
                                                                                                                                                                                                                                    <div class="stat-box"><div class="stat-val" id="elapsedVal">00:00</div><div class="stat-lbl">گزرا ہوا وقت</div></div>
                                                                                                                                                                                                                                          <div class="stat-box"><div class="stat-val blue" id="speedVal">0.0</div><div class="stat-lbl">km/h رفتار</div></div>
                                                                                                                                                                                                                                                <div class="stat-box"><div class="stat-val orange" id="paceVal">--:--</div><div class="stat-lbl">فی کلومیٹر وقت</div></div>
                                                                                                                                                                                                                                                      <div class="stat-box"><div class="stat-val" id="calVal">0</div><div class="stat-lbl">کیلوریز</div></div>
                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                              <div class="btn-row">
                                                                                                                                                                                                                                                                    <button class="btn btn-reset" style="color:#ff6666;border-color:rgba(255,68,68,0.3)" onclick="resetAll()">🗑 سب صاف کریں</button>
                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                          <div class="finish-overlay" id="finishOverlay">
                                                                                                                                                                                                                                                                            <div class="finish-card">
                                                                                                                                                                                                                                                                                <div class="finish-emoji">🏅</div>
                                                                                                                                                                                                                                                                                    <div class="finish-title">TIME UP!</div>
                                                                                                                                                                                                                                                                                        <div class="finish-stat"><span class="val" id="fDist">0.00</span><span class="lbl">کل مسافت</span></div>
                                                                                                                                                                                                                                                                                            <div class="finish-stat"><span class="val" id="fTime">00:00</span><span class="lbl">کل وقت</span></div>
                                                                                                                                                                                                                                                                                                <div class="finish-stat"><span class="val" id="fPace">--:--</span><span class="lbl">اوسط رفتار</span></div>
                                                                                                                                                                                                                                                                                                    <div class="finish-stat"><span class="val" id="fCal">0 kcal</span><span class="lbl">کیلوریز</span></div>
                                                                                                                                                                                                                                                                                                        <button class="btn-done" onclick="closeFinish()">✓ DONE</button>
                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                          <script>
                                                                                                                                                                                                                                                                                                          let isRunning=false,isPaused=false;
                                                                                                                                                                                                                                                                                                          let timerInterval=null,elapsedInterval=null,watchId=null;
                                                                                                                                                                                                                                                                                                          let remainSec=0,totalSec=0,elapsedSec=0;
                                                                                                                                                                                                                                                                                                          let totalDistM=0,lastPos=null,currentUnit='km',currentSpeed=0;

                                                                                                                                                                                                                                                                                                          function haversine(lat1,lon1,lat2,lon2){
                                                                                                                                                                                                                                                                                                            const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
                                                                                                                                                                                                                                                                                                              const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
                                                                                                                                                                                                                                                                                                                return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                function fmt(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}

                                                                                                                                                                                                                                                                                                                function setUnit(u){
                                                                                                                                                                                                                                                                                                                  currentUnit=u;
                                                                                                                                                                                                                                                                                                                    document.getElementById('btnKm').className='dist-unit-btn'+(u==='km'?' active':'');
                                                                                                                                                                                                                                                                                                                      document.getElementById('btnM').className='dist-unit-btn'+(u==='m'?' active':'');
                                                                                                                                                                                                                                                                                                                        updateDistDisplay();
                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                        function updateDistDisplay(){
                                                                                                                                                                                                                                                                                                                          const val=currentUnit==='km'?(totalDistM/1000).toFixed(2):Math.round(totalDistM).toString();
                                                                                                                                                                                                                                                                                                                            document.getElementById('distNum').textContent=val;
                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                            function startGPS(){
                                                                                                                                                                                                                                                                                                                              if(!navigator.geolocation){setGPS('error','GPS support nahi hai');return}
                                                                                                                                                                                                                                                                                                                                setGPS('searching','🔍 GPS dhundh raha hai...');
                                                                                                                                                                                                                                                                                                                                  watchId=navigator.geolocation.watchPosition(
                                                                                                                                                                                                                                                                                                                                      pos=>{
                                                                                                                                                                                                                                                                                                                                            setGPS('active','✅ GPS Active — Track ho raha hai');
                                                                                                                                                                                                                                                                                                                                                  if(lastPos&&isRunning){
                                                                                                                                                                                                                                                                                                                                                          const d=haversine(lastPos.lat,lastPos.lon,pos.coords.latitude,pos.coords.longitude);
                                                                                                                                                                                                                                                                                                                                                                  if(d>0.5&&d<50){totalDistM+=d;updateDistDisplay();updateStats()}
                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                              lastPos={lat:pos.coords.latitude,lon:pos.coords.longitude};
                                                                                                                                                                                                                                                                                                                                                                                    if(pos.coords.speed&&pos.coords.speed>0){
                                                                                                                                                                                                                                                                                                                                                                                            currentSpeed=pos.coords.speed*3.6;
                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('speedVal').textContent=currentSpeed.toFixed(1);
                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                              },
                                                                                                                                                                                                                                                                                                                                                                                                                  err=>{
                                                                                                                                                                                                                                                                                                                                                                                                                        let msg='GPS Error';
                                                                                                                                                                                                                                                                                                                                                                                                                              if(err.code===1)msg='❌ Location allow karein — Settings mein ja ke';
                                                                                                                                                                                                                                                                                                                                                                                                                                    else if(err.code===2)msg='❌ GPS signal nahi mila — bahar jayein';
                                                                                                                                                                                                                                                                                                                                                                                                                                          else if(err.code===3)msg='GPS timeout — dobara try karein';
                                                                                                                                                                                                                                                                                                                                                                                                                                                setGPS('error',msg);
                                                                                                                                                                                                                                                                                                                                                                                                                                                    },
                                                                                                                                                                                                                                                                                                                                                                                                                                                        {enableHighAccuracy:true,maximumAge:0,timeout:20000}
                                                                                                                                                                                                                                                                                                                                                                                                                                                          );
                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                          function stopGPS(){if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null}setGPS('idle','GPS بند ہے')}

                                                                                                                                                                                                                                                                                                                                                                                                                                                          function setGPS(state,msg){
                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('gpsBar').className='gps-bar gps-'+state;
                                                                                                                                                                                                                                                                                                                                                                                                                                                              document.getElementById('gpsText').textContent=msg;
                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                              function startRun(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(isPaused){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    isRunning=true;isPaused=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        runTimer();startElapsed();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if(watchId===null)startGPS();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setStatus('running');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('startBtn').disabled=true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('pauseBtn').disabled=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const mins=parseInt(document.getElementById('setMin').value)||0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const secs=parseInt(document.getElementById('setSec').value)||0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    totalSec=mins*60+secs;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if(totalSec<=0){alert('Pehle time set karein!');return}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        remainSec=totalSec;elapsedSec=0;totalDistM=0;lastPos=null;currentSpeed=0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          isRunning=true;isPaused=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            updateDistDisplay();updateTimerDisp();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              runTimer();startElapsed();startGPS();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setStatus('running');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById('startBtn').disabled=true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('pauseBtn').disabled=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('setMin').disabled=true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('setSec').disabled=true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.getElementById('progressFill').style.width='100%';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function runTimer(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            clearInterval(timerInterval);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              timerInterval=setInterval(()=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if(remainSec<=0){clearInterval(timerInterval);timerFinished();return}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      remainSec--;updateTimerDisp();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.getElementById('progressFill').style.width=(totalSec>0?(remainSec/totalSec)*100:0)+'%';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            },1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function startElapsed(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              clearInterval(elapsedInterval);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                elapsedInterval=setInterval(()=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    elapsedSec++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('elapsedVal').textContent=fmt(elapsedSec);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            updateStats();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              },1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              function updateTimerDisp(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const el=document.getElementById('timerDisp');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  el.textContent=fmt(remainSec);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const pct=totalSec>0?remainSec/totalSec:1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      el.className='timer-big'+(remainSec===0?' done':pct<=0.25?' warning':'');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function updateStats(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const distKm=totalDistM/1000;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if(elapsedSec>0&&distKm>0.01){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              document.getElementById('paceVal').textContent=fmt(Math.round(elapsedSec/distKm));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById('calVal').textContent=Math.round(distKm*65);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function pauseRun(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    clearInterval(timerInterval);clearInterval(elapsedInterval);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      isRunning=false;isPaused=true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        setStatus('paused');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.getElementById('startBtn').disabled=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('pauseBtn').disabled=true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function timerFinished(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              clearInterval(elapsedInterval);stopGPS();isRunning=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setStatus('done');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById('startBtn').disabled=false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('pauseBtn').disabled=true;
